name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev ccache \
            libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython pip setuptools wheel

      - name: Build APK (arm64-v8a)
        run: |
          buildozer android debug --arch arm64-v8a 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIProjectGen-APK
          path: ./bin/*.apk
          if-no-files-found: error
