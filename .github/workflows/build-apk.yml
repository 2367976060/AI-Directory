name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev ccache
          sudo apt-get install -y -qq \
            libltdl-dev libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython

      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIProjectGen-APK
          path: ./bin/*.apk
          if-no-files-found: error

  build-arm64:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [arm64-v8a]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev ccache \
            libltdl-dev libsdl2-dev

      - name: Install Buildozer
        run: pip install --upgrade buildozer cython

      - name: Build APK (${{ matrix.arch }})
        run: |
          buildozer android debug --arch ${{ matrix.arch }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIProjectGen-${{ matrix.arch }}
          path: ./bin/*.apk
          if-no-files-found: error
